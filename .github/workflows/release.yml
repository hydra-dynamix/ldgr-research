name: Binary release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to release, e.g. 0.1.4. Defaults to Cargo.toml version."
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub release as prerelease"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }} binary release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            binary_ext: ""
          - os: self-hosted
            platform: linux-aarch64
            binary_ext: ""
          - os: macos-13
            platform: macos-x86_64
            binary_ext: ""
          - os: macos-14
            platform: macos-aarch64
            binary_ext: ""
          - os: windows-latest
            platform: windows-x86_64
            binary_ext: ".exe"
    env:
      PACKAGE: ldgr-research
      BINARY: ldgr-research
      RELEASE_NAME: ldgr-research
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Resolve version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}"
          if [[ -z "$version" ]]; then
            version="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json,sys; data=json.load(sys.stdin); print(next(p["version"] for p in data["packages"] if p["name"]=="ldgr-research"))')"
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "version must be semantic version syntax" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build binary
        run: cargo build --release -p "$PACKAGE"
        shell: bash

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.version }}"
          platform="${{ matrix.platform }}"
          binary_file="${BINARY}${{ matrix.binary_ext }}"
          staging="dist/${RELEASE_NAME}-${version}/${platform}"
          archive="dist/${RELEASE_NAME}-${version}-${platform}.tar.gz"
          mkdir -p "$staging"
          cp "target/release/${binary_file}" "$staging/${binary_file}"
          chmod +x "$staging/${binary_file}" || true
          cp README.md "dist/${RELEASE_NAME}-${version}/"
          if [[ -f LICENSE ]]; then cp LICENSE "dist/${RELEASE_NAME}-${version}/"; fi
          if [[ -f adapter.toml ]]; then cp adapter.toml "dist/${RELEASE_NAME}-${version}/adapter.toml"; fi
          for dir in prompts templates extensions skills scripts docs; do
            if [[ -d "$dir" ]]; then mkdir -p "dist/${RELEASE_NAME}-${version}/${dir}"; cp -R "$dir/." "dist/${RELEASE_NAME}-${version}/${dir}/"; fi
          done
          cat > "dist/${RELEASE_NAME}-${version}/RELEASE-METADATA.json" <<JSON
          {
            "schema_version": 1,
            "package": "${PACKAGE}",
            "binary": "${BINARY}",
            "version": "${version}",
            "platform": "${platform}",
            "commit": "${GITHUB_SHA}",
            "source_repository": "${GITHUB_REPOSITORY}"
          }
          JSON
          tar -C dist -czf "$archive" "${RELEASE_NAME}-${version}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive" > "${archive}.sha256"
          else
            shasum -a 256 "$archive" > "${archive}.sha256"
          fi

      - name: Create or update GitHub release
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.version }}"
          tag="v${version}"
          title="${RELEASE_NAME} v${version}"
          prerelease_flag=""
          if [[ "${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || 'true' }}" == "true" ]]; then
            prerelease_flag="--prerelease"
          fi
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$title" --notes "${RELEASE_NAME} ${version} binary release from ${GITHUB_SHA}." $prerelease_flag
          fi
          gh release upload "$tag" dist/${RELEASE_NAME}-${version}-*.tar.gz dist/${RELEASE_NAME}-${version}-*.tar.gz.sha256 --clobber

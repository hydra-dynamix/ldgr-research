required = true

[[outputs]]
name = "setup_observations"
type = "ldgr-records"
required = true

[[outputs]]
name = "research_spine"
type = "ldgr-records"
required = true

[[outputs]]
name = "first_work_items"
type = "ldgr-records"
required = true

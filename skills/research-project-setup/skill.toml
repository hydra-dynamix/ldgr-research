version = "0.1.0"
category = "onboarding"
tags = ["ldgr", "research", "adapter", "onboarding", "project-setup", "program-setup"]
activation = ["onboard project", "set up research project", "initialize research adapter", "create research program", "prepare first work"]

[[inputs]]
